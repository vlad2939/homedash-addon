server {
    listen 8099;
    server_name _;

    root /var/www/homedash;
    index index.html;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json font/woff2;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(woff2|js|css)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Main app - serve index.html for all routes (SPA hash routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logs
    access_log /proc/1/fd/1;
    error_log  /proc/1/fd/2 warn;
}
